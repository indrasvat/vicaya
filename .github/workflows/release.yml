name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.event == 'push'
      )
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      sha: ${{ steps.release.outputs.sha }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Create or publish release
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          # Use RELEASE_PLEASE_TOKEN in production so release PRs trigger CI.
          # GITHUB_TOKEN is a safe fallback, but GitHub suppresses workflows
          # caused by its own token to prevent recursive CI.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-assets:
    name: Build release assets and Pages artifact
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
      VERSION: ${{ needs.release-please.outputs.version }}
    steps:
      - name: Checkout released commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.sha || needs.release-please.outputs.tag_name }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add targets
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release artifacts
        run: ./scripts/build-release.sh

      - name: Upload release artifacts
        run: gh release upload "$TAG_NAME" artifacts/*.tar.gz artifacts/*.sha256 --clobber

      - name: Publish release
        run: gh release edit "$TAG_NAME" --draft=false

      - name: Prepare GitHub Pages site
        run: |
          set -euo pipefail
          VERSION="${VERSION:-${TAG_NAME#v}}"
          RELEASE_URL="https://github.com/indrasvat/vicaya/releases/tag/${TAG_NAME}"
          DOWNLOAD_BASE="https://github.com/indrasvat/vicaya/releases/download/${TAG_NAME}"
          mkdir -p pages
          cp -R site/. pages/
          cat > pages/version.json <<EOF
          {
            "schema_version": 1,
            "project": "vicaya",
            "version": "${VERSION}",
            "tag_name": "${TAG_NAME}",
            "release_url": "${RELEASE_URL}",
            "tarball_url": "${DOWNLOAD_BASE}/vicaya-universal.tar.gz",
            "checksum_url": "${DOWNLOAD_BASE}/vicaya-universal.tar.gz.sha256",
            "generated_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF
          cat pages/version.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: pages

  deploy-pages:
    name: Deploy GitHub Pages
    needs: [release-please, build-assets]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
